databaseChangeLog:
  - changeSet:
      id: 01 - Criacao da tabela de transacoes
      author: diogo.graciano
      changes:
        - createTable:
            tableName: transacoes
            remarks: Registro de transacoes financeiras.
            columns:
              - column:
                  name: id
                  type: serial4
                  autoIncrement: true
                  remarks: Chave primaria da tabela de transacoes
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: transacoes_pk

              - column:
                  name: descricao
                  type: varchar(400)
                  remarks: Descricao da transacao
                  constraints:
                    nullable: false

              - column:
                  name: valor
                  type: numeric(10,2)
                  remarks: Valor monetario da transacao
                  constraints:
                    nullable: false

              - column:
                  name: tipo
                  type: integer
                  remarks: Tipo da transacao (1-Despesa, 2-Receita)
                  constraints:
                    nullable: false

              - column:
                  name: id_categoria
                  type: integer
                  remarks: Referencia para a tabela categorias
                  constraints:
                    nullable: false

              - column:
                  name: id_pessoa
                  type: integer
                  remarks: Referencia para a tabela pessoas
                  constraints:
                    nullable: false

              - column:
                  name: ativo
                  type: boolean
                  remarks: Indica se a transacao esta ativa
                  defaultValueBoolean: true
                  constraints:
                    nullable: false

              - column:
                  name: data_criacao
                  type: timestamptz
                  remarks: Data de criacao do registro
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: transacoes
            baseColumnNames: id_categoria
            referencedTableName: categorias
            referencedColumnNames: id
            constraintName: fk_transacoes_categorias
            onDelete: RESTRICT
            onUpdate: CASCADE

        - addForeignKeyConstraint:
            baseTableName: transacoes
            baseColumnNames: id_pessoa
            referencedTableName: pessoas
            referencedColumnNames: id
            constraintName: fk_transacoes_pessoas
            onDelete: RESTRICT
            onUpdate: CASCADE
