databaseChangeLog:
  - changeSet:
      id: 02 - Concessao de permissoes para transacoes
      author: diogo.graciano
      changes:
        - sql:
            comment: Conceder ao role api_sistema_financeiro acesso total a tabela transacoes
            sql: GRANT ALL PRIVILEGES ON TABLE transacoes TO api_sistema_financeiro;

        - sql:
            comment: Conceder ao role api_sistema_financeiro acesso total a todas as sequences no schema public
            sql: GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO api_sistema_financeiro;
