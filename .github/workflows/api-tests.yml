name: API Tests

on:
  push:
    paths:
      - "api/**"
      - ".github/workflows/api-tests.yml"
  pull_request:
    paths:
      - "api/**"
      - ".github/workflows/api-tests.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore api/SistemaFinanceiro.sln

      - name: Test
        run: dotnet test api/SistemaFinanceiro.sln --configuration Release --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: "**/TestResults/*.trx"
          if-no-files-found: ignore
